<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>Rabattkod för Offroad Bumpis</title>
  <meta name="description" content="Få rabatt på Offroad Bumpis. Spara koden och skicka din bokningsförfrågan." />
  <meta name="robots" content="noindex,nofollow" />

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap">

  <style>
    body{
      margin:0;
      font-family:Inter,sans-serif;
      background:#f5fff1;
      color:#16311d;
    }
    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }
    h1,h2{
      font-family:"Baloo 2",sans-serif;
      line-height:1;
      margin:0 0 12px;
    }
    h1{font-size:42px}
    p{font-size:17px;line-height:1.7;color:#3f5c46}
    .card{
      background:#fff;
      padding:28px;
      border-radius:22px;
      margin-top:24px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }
    .code{
      font-family:"Baloo 2",sans-serif;
      font-size:42px;
      font-weight:800;
      text-align:center;
      background:#f7fff3;
      padding:18px;
      border-radius:16px;
      margin:18px 0;
      word-break:break-word;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:14px 20px;
      border-radius:999px;
      font-weight:800;
      border:none;
      cursor:pointer;
      text-decoration:none;
    }
    .btn-primary{
      background:#102217;
      color:#fff;
    }
    input,select{
      width:100%;
      box-sizing:border-box;
      margin-top:10px;
      padding:12px;
      border:1px solid #d7e5d8;
      border-radius:10px;
      font-size:16px;
    }
    label{
      display:block;
      margin-top:14px;
      font-weight:700;
    }
    .status{
      margin-top:12px;
      font-size:14px;
      font-weight:700;
      color:#214e2b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Rabatt på Offroad Bumpis</h1>
    <p>
      Spara rabattkoden, fyll i dina uppgifter och gå sedan vidare till bokning.
    </p>

    <div class="card">
      <div>Din rabattkod</div>
      <div class="code" id="discountCode">LADDAR...</div>
      <button class="btn btn-primary" type="button" id="copyBtn">Kopiera kod</button>
      <div class="status" id="copyStatus"></div>
    </div>

    <div class="card">
      <h2>Skicka bokningsförfrågan</h2>

      <form
        id="bumpisForm"
        action="PASTA_IN_BUMPIS_EXEC_HÄR"
        method="GET"
        target="hidden_iframe"
      >
        <input type="hidden" name="Ref" id="refField">
        <input type="hidden" name="Kod" id="codeField">
        <input type="hidden" name="Typ" id="typeField">

        <label for="namn">Namn</label>
        <input id="namn" type="text" name="Namn" required>

        <label for="epost">E-post</label>
        <input id="epost" type="email" name="E-post" required>

        <label for="telefon">Telefon</label>
        <input id="telefon" type="tel" name="Telefon" required>

        <button class="btn btn-primary" type="submit" id="submitBtn">Skicka och gå vidare</button>
        <div class="status" id="formStatus"></div>
      </form>

      <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
    </div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);

      const code = (params.get("code") || "KOMPASS-1026").toUpperCase();
      const ref = (params.get("ref") || "direkt").toLowerCase();
      const type = (params.get("type") || "privat").toLowerCase();

      const privateUrl = "https://tidycal.com/boka-bumperballs/offroad-bumpis-1r6v6pz";
      const schoolUrl = "https://tidycal.com/boka-bumperballs/offertforfragan-skolor-and-fritids-bumperballs";

      const bookingUrl = type === "skola" ? schoolUrl : privateUrl;

      const discountCodeEl = document.getElementById("discountCode");
      const copyBtn = document.getElementById("copyBtn");
      const copyStatus = document.getElementById("copyStatus");
      const form = document.getElementById("bumpisForm");
      const refField = document.getElementById("refField");
      const codeField = document.getElementById("codeField");
      const typeField = document.getElementById("typeField");
      const formStatus = document.getElementById("formStatus");
      const submitBtn = document.getElementById("submitBtn");

      discountCodeEl.textContent = code;
      refField.value = ref;
      codeField.value = code;
      typeField.value = type;

      copyBtn.addEventListener("click", async function () {
        try {
          await navigator.clipboard.writeText(code);
          copyStatus.textContent = "Rabattkoden är kopierad: " + code;
        } catch (error) {
          copyStatus.textContent = "Kunde inte kopiera automatiskt. Koden är: " + code;
        }
      });

      form.addEventListener("submit", function () {
        submitBtn.disabled = true;
        submitBtn.textContent = "Skickar...";
        formStatus.textContent = "Skickar och öppnar bokningen...";

        setTimeout(function () {
          window.location.href = bookingUrl + "?utm_source=affiliate&utm_medium=partner&utm_campaign=" + encodeURIComponent(ref) + "&utm_content=" + encodeURIComponent(code);
        }, 1200);
      });
    })();
  </script>
</body>
</html>
