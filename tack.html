<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#14361b" />

  <title>Tack | Offroad Bumpis</title>
  <meta
    name="description"
    content="Tack för din bokning hos Offroad Bumpis."
  />
  <link rel="canonical" href="https://offroadbumpis.se/tack.html" />

  <meta property="og:title" content="Tack | Offroad Bumpis" />
  <meta property="og:description" content="Tack för din bokning hos Offroad Bumpis." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://offroadbumpis.se/tack.html" />
  <meta property="og:image" content="https://offroadbumpis.se/Bumperball%20på%20fotbollsplan%20i%20Veber%C3%B6d.png" />

  <link rel="icon" type="image/png" sizes="32x32" href="Offroad Bumpis logo.png" />
  <link rel="apple-touch-icon" href="Offroad Bumpis logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#f5fff1;
      --bg-2:#ecffe4;
      --card:#ffffff;
      --text:#16311d;
      --muted:#4d6454;
      --line:rgba(18, 64, 29, 0.10);
      --green:#74d64c;
      --green-dark:#2f7f25;
      --green-soft:#dff8d1;
      --yellow:#ffd84d;
      --dark:#102217;
      --dark-2:#14361b;
      --shadow:0 18px 55px rgba(14, 53, 22, 0.10);
      --shadow-soft:0 10px 28px rgba(14, 53, 22, 0.06);
      --radius:24px;
      --max:1180px;
    }

    *{
      box-sizing:border-box;
      min-width:0;
    }

    html{
      scroll-behavior:smooth;
      overflow-x:hidden;
    }

    body{
      margin:0;
      overflow-x:hidden;
      font-family:"Inter",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, #fdffe7 0, transparent 22%),
        radial-gradient(circle at top right, #e9ffd8 0, transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, #effbea 100%);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    a{
      color:inherit;
      text-decoration:none;
      overflow-wrap:anywhere;
    }

    img{
      max-width:100%;
      height:auto;
      display:block;
    }

    .container{
      width:min(var(--max), calc(100% - 32px));
      margin:0 auto;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter:blur(12px);
      background:rgba(245,255,241,0.84);
      border-bottom:1px solid var(--line);
    }

    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      min-height:72px;
      padding:10px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:800;
      letter-spacing:-0.02em;
      min-width:0;
      flex:1 1 auto;
    }

    .brand-logo{
      width:42px;
      height:42px;
      object-fit:contain;
      border-radius:12px;
      box-shadow:var(--shadow-soft);
      flex:0 0 auto;
    }

    .brand span{
      font-size:15px;
      line-height:1.1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .nav-cta{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:12px 18px;
      border-radius:999px;
      background:var(--dark);
      color:#fff;
      font-weight:800;
      white-space:nowrap;
      box-shadow:var(--shadow-soft);
      flex:0 0 auto;
    }

    .hero{
      padding:54px 0 46px;
    }

    .hero-wrap{
      display:grid;
      grid-template-columns:minmax(0,1fr);
      gap:22px;
      max-width:760px;
      margin:0 auto;
    }

    .thank-card{
      background:linear-gradient(180deg, #1b4724 0%, #14361b 100%);
      color:#fff;
      border-radius:30px;
      padding:26px;
      box-shadow:0 28px 80px rgba(8, 34, 16, 0.18);
      position:relative;
      overflow:hidden;
    }

    .thank-card::after{
      content:"";
      position:absolute;
      right:-90px;
      bottom:-90px;
      width:240px;
      height:240px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,255,255,0.16), transparent 70%);
      pointer-events:none;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      background:rgba(255,255,255,0.10);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:999px;
      font-size:13px;
      font-weight:800;
      color:#e9f7e7;
      max-width:100%;
      position:relative;
      z-index:1;
    }

    h1{
      font-family:"Baloo 2",sans-serif;
      letter-spacing:-0.03em;
      margin:16px 0 14px;
      line-height:0.96;
      position:relative;
      z-index:1;
      font-size:clamp(2.4rem, 7vw, 4.6rem);
      max-width:8ch;
    }

    .lead{
      margin:0;
      color:#e3f1e0;
      font-size:18px;
      line-height:1.7;
      max-width:560px;
      position:relative;
      z-index:1;
    }

    .info-box{
      margin-top:18px;
      background:rgba(255,255,255,0.09);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:20px;
      padding:16px;
      position:relative;
      z-index:1;
    }

    .info-box p{
      margin:0;
      color:#f3fbf1;
      line-height:1.75;
      font-size:16px;
    }

    .hero-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:22px;
      position:relative;
      z-index:1;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-height:50px;
      padding:14px 20px;
      border-radius:999px;
      font-weight:800;
      transition:.2s ease;
      border:none;
      cursor:pointer;
      font:inherit;
      text-align:center;
      width:auto;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .btn-primary{
      background:#fff;
      color:var(--text);
      box-shadow:var(--shadow-soft);
    }

    footer{
      padding:24px 0 46px;
      color:#5b6e60;
      font-size:14px;
    }

    .footer-line{
      border-top:1px solid var(--line);
      padding-top:18px;
      display:flex;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      line-height:1.6;
    }

    @media (max-width: 720px){
      .container{
        width:min(var(--max), calc(100% - 24px));
      }

      .nav{
        gap:10px;
        padding:10px 0;
        min-height:auto;
      }

      .brand{
        gap:10px;
      }

      .brand-logo{
        width:38px;
        height:38px;
      }

      .brand span{
        font-size:14px;
        max-width:110px;
        white-space:normal;
      }

      .nav-cta{
        min-height:42px;
        padding:10px 14px;
        font-size:14px;
      }

      .hero{
        padding:30px 0 28px;
      }

      .thank-card{
        border-radius:24px;
        padding:18px;
      }

      h1{
        font-size:clamp(2rem, 11vw, 3.2rem);
        line-height:0.98;
        max-width:none;
      }

      .lead{
        font-size:15.5px;
        line-height:1.7;
      }

      .info-box{
        border-radius:18px;
        padding:14px;
      }

      .info-box p{
        font-size:14.5px;
        line-height:1.7;
      }

      .hero-actions{
        gap:10px;
      }

      .hero-actions .btn{
        width:100%;
        flex:1 1 100%;
      }

      .footer-line{
        flex-direction:column;
        align-items:flex-start;
      }
    }

    @media (max-width: 420px){
      h1{
        font-size:2.1rem;
      }

      .eyebrow{
        font-size:12px;
        padding:7px 10px;
      }

      .thank-card{
        padding:16px;
      }

      .btn{
        min-height:46px;
        padding:12px 16px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <a href="./index.html" class="brand" aria-label="Offroad Bumpis startsida">
        <img src="Offroad Bumpis logo.png" alt="Offroad Bumpis logga" class="brand-logo" />
        <span>Offroad Bumpis</span>
      </a>

      <a href="./index.html" class="nav-cta">Hem</a>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <div class="hero-wrap">
          <div class="thank-card">
            <span class="eyebrow">Tack för din bokning</span>
            <h1>Bokningen är skickad</h1>
            <p class="lead">
              Jag skickar ett manuellt bekräftelsemail inom 1 arbetsdag.
            </p>

            <div class="info-box">
              <p>
                I mejlet skickar jag användarmanualen och uthyrningsdokumenten som jag använder som underlag i bokföringen.
              </p>
            </div>

          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <div class="footer-line">
        <span>© 2026 Offroad Bumpis</span>
        <span>Bumperball i Skåne</span>
      </div>
    </div>
  </footer>
</body>
</html>
